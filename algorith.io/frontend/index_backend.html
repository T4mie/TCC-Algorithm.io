<html>
  <head>
    <meta charset="UTF-8" />
     <title>Lista Ligada Simples</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Lista Ligada Simples</h1>
      <!-- Controles para adicionar nós -->
      <div class="controls">
        <input type="text" id="nodeValue" placeholder="Valor do nó" onkeypress="if(event.key === 'Enter') addNode()">
        <button onclick="addNode()">Adicionar</button>
      </div>
      <!-- Exibição da lista ligada -->
      <div id="chain" class="list-chain"></div>
    </div>

    <script>
      async function addNode() {
        // Valida se o campo de valor do nó (id = nodeValue) não está vazio
        const value = document.getElementById('nodeValue').value.trim();
        if (!value) {
          alert('Digite um valor para o nó');
          return;
        }
        
        try {
          await fetch('http://localhost:5000/nodes_last', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ value: value })
          });
          
          document.getElementById('nodeValue').value = '';
          refreshData();
        } catch (err) {
          alert('Erro ao criar nó: ' + err);
        }
      }

      async function refreshData() {
        try {
          const response = await fetch('http://localhost:5000/data');
          const data = await response.json();

          const chainDiv = document.getElementById('chain');
          if (data.nodes.length === 0) {
            chainDiv.innerHTML = '<p class="empty">Nenhum nó criado ainda</p>';
          } else {
            let nodeMap = {};
            data.nodes.forEach(n => nodeMap[n.id] = n);
            
            let pointedTo = new Set();
            data.nodes.forEach(n => {
              if (n.next) pointedTo.add(n.next);
            });
            
            let firstNode = data.nodes.find(n => !pointedTo.has(n.id));
            
            let html = '';
            let current = firstNode;
            while (current) {
              html += `<div class="node-box">${current.value}</div>`;
              if (current.next) {
                html += '<div class="arrow">→</div>';
                current = nodeMap[current.next];
              } else {
                html += '<div class="arrow">→</div><div class="null-pointer">∅</div>';
                current = null;
              }
            }
            chainDiv.innerHTML = html;
          }
        } catch (err) {
          console.error('Erro ao carregar dados:', err);
        }
      }
      refreshData();
    </script>
  </body>
</html>
